<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stars"></div>

  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">NASA APOD Gallery</p>
      <h1>
        <span class="nasa-wordmark">NASA</span>
        <span class="title-text">Space Explorer</span>
      </h1>
      <p class="hero-copy">
      </p>
    </header>

    <section class="fact-panel" aria-labelledby="fact-heading">
      <div>
        <p class="fact-label">Did You Know?</p>
        <h2 id="fact-heading">Random Space Fact</h2>
        <p id="space-fact" class="fact-text"></p>
      </div>
      <button id="new-fact-btn" class="secondary-btn" type="button">New Fact</button>
    </section>

    <section class="controls-panel" aria-labelledby="controls-heading">
      <div class="controls-copy">
        <h2 id="controls-heading">Choose your 9-day gallery</h2>
        <p>
        </p>
      </div>

      <form id="date-form" class="date-form">
        <label>
          Start Date
          <input id="start-date" type="date" required />
        </label>

        <label>
          End Date
          <input id="end-date" type="date" required />
        </label>

        <button class="primary-btn" type="submit">Get Space Images</button>
      </form>

      <p id="status-message" class="status-message" aria-live="polite"></p>
    </section>

    <section class="gallery-section" aria-labelledby="gallery-heading">
      <div class="section-heading-row">
        <h2 id="gallery-heading">Gallery</h2>
        <p id="gallery-summary" class="gallery-summary"></p>
      </div>
      <div id="gallery" class="gallery-grid"></div>
    </section>
  </main>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-backdrop" data-close="true"></div>

    <div class="modal-card">
      <button id="close-modal-btn" class="close-modal-btn" type="button" aria-label="Close modal">&times;</button>

      <div id="modal-media" class="modal-media"></div>

      <div class="modal-content">
        <p id="modal-date" class="modal-date"></p>
        <h3 id="modal-title"></h3>
        <p id="modal-explanation" class="modal-explanation"></p>
        <a id="modal-link" class="secondary-btn modal-link hidden" href="#" target="_blank" rel="noopener noreferrer">Open Original</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
